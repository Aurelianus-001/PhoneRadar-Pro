{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneRadar - 手机测评</title>
    <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="container">
        <header style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;">
            <div style="display: flex; align-items: center;">
                <img src="{% static 'images/logo.png' %}" alt="PhoneRadar Logo" height="50" style="margin-right: 15px;">
                <h1>📱 PhoneRadar 手机雷达</h1>
            </div>
            <nav>
                <a href="{% url 'review_list' %}">首页</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'add_review' %}">✍️ 写新测评</a>
                    <a href="{% url 'add_phone' %}">📱 添加手机型号</a>
                    <span>欢迎，{{ user.username }}！</span>
                    <form method="post" action="{% url 'logout' %}" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" style="background:none; border:none; color:blue; cursor:pointer;">🚪 登出</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">🔐 登录</a>
                    <a href="{% url 'register' %}">📝 注册</a>
                {% endif %}
            </nav>
        </header>
        <main>
            {% block content %}
            {% endblock %}
        </main>
        <footer>
            <p>&copy; 2026 PhoneRadar - 你的手机测评专家</p>
        </footer>
    </div>
</body>
</html>
